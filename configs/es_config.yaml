# ES (E-mini S&P 500) swing model config — V1.
# These mirror the code defaults; a config loader (V1.1) can override them.
symbol: ES
yf_symbol: ES=F
micro: MES
point_value: 5.0      # MES = $5 / index point
tick: 0.25
horizon: 5            # forward-return / max holding (trading days)
regime: hmm           # market HMM lifts ES OOS IC (V1.2)

signal:
  long_threshold: 0.35
  short_threshold: -0.35
  vol_window: 21       # forecast-vol lookback (days)

execution:
  atr_window: 14
  stop_atr_mult: 2.0
  target_atr_mult: 3.0

risk:
  sizing_mode: vol_target  # vol_target (default, V1.3) | risk
  target_vol: 0.10         # annualized per-trade vol target
  risk_frac: 0.0075        # per-trade risk fraction (used by 'risk' sizing mode)
  max_contracts: 10
  strength_scale: 0.5      # |Sharpe| at which conviction multiplier saturates
  dd_halve: 0.05
  dd_halt: 0.10
  event_window_days: 1

model:                 # LightGBM (regularized / parsimonious)
  objective: huber
  n_estimators: 300
  learning_rate: 0.02
  num_leaves: 15
  max_depth: 3
  min_child_samples: 100
  reg_alpha: 1.0
  reg_lambda: 5.0
