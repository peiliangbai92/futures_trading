name: daily-briefing

# TWO daily ES/GC heads-up reports — signal status + price levels (+ GC gamma
# map) — every trading day, regardless of whether there's a tradeable action:
#   • morning  = US cash open,  09:30 ET
#   • evening  = futures reopen, 18:00 ET
# (The separate daily-signal workflow stays quiet unless a BUY/EXIT fires.)
#
# GitHub cron is UTC-only and DST-blind, so each session is scheduled at BOTH its
# summer (EDT) and winter (EST) UTC time; an ET-hour guard maps each fire to a
# session (09→morning, 18→evening) and rejects the wrong-DST one. A per-(date,
# session) marker dedupes so both reports land exactly once each.

on:
  schedule:
    - cron: "30 13 * * 1-5"   # 09:30 EDT (summer) — cash open
    - cron: "30 14 * * 1-5"   # 09:30 EST (winter) — cash open
    - cron: "0 22 * * 1-5"    # 18:00 EDT (summer) — futures open
    - cron: "0 23 * * 1-5"    # 18:00 EST (winter) — futures open
  workflow_dispatch:
    inputs:
      session:
        description: "morning | evening | auto (pick by ET hour)"
        default: "auto"

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: ET session guard (map UTC cron -> ET session, DST-safe)
        id: guard
        run: |
          ETDATE=$(TZ=America/New_York date +%F)
          ETHOUR=$(TZ=America/New_York date +%H)
          echo "etdate=$ETDATE" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SESSION="${{ github.event.inputs.session }}"
            if [ "$SESSION" = "auto" ] || [ -z "$SESSION" ]; then
              if [ "$((10#$ETHOUR))" -lt 12 ]; then SESSION="morning"; else SESSION="evening"; fi
            fi
          elif [ "$ETHOUR" = "09" ]; then SESSION="morning"
          elif [ "$ETHOUR" = "18" ]; then SESSION="evening"
          else
            echo "ET hour $ETHOUR isn't a session open (wrong-DST cron) — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "session=$SESSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Session: $SESSION  (ET $ETDATE ${ETHOUR}h)"

      - name: Restore data cache
        if: steps.guard.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: data/raw
          key: data-raw-brief-${{ github.run_id }}
          restore-keys: |
            data-raw-

      - name: Refresh data (retry transient fetch failures)
        if: steps.guard.outputs.skip != 'true'
        run: |
          for i in 1 2 3; do
            if python -m futures_swing.data_loader; then exit 0; fi
            echo "data_loader attempt $i failed; retrying in 20s..."; sleep 20
          done
          echo "data_loader failed after 3 attempts"; exit 1

      - name: Render briefing
        if: steps.guard.outputs.skip != 'true'
        env:
          BRIEF_DATE: ${{ steps.guard.outputs.etdate }}
          BRIEF_SESSION: ${{ steps.guard.outputs.session }}
        run: |
          mkdir -p out
          python -m futures_swing.briefing --out out/briefing.md

      - name: Post briefing (one persistent issue, per-session daily comment, deduped)
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ETDATE="${{ steps.guard.outputs.etdate }}"
          SESSION="${{ steps.guard.outputs.session }}"
          MARK="<!-- brief:${ETDATE}:${SESSION} -->"
          TITLE="📋 ES/GC daily briefing"
          printf '\n\n%s\ncc @%s\n' "$MARK" "${{ github.repository_owner }}" >> out/briefing.md
          N=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -z "$N" ]; then
            gh issue create --title "$TITLE" --body-file out/briefing.md && echo "Created briefing thread."
            exit 0
          fi
          SEEN=$(gh issue view "$N" --json body,comments \
                  --jq '(.body) + " " + ((.comments // []) | map(.body) | join(" "))' | grep -cF "$MARK" || true)
          if [ "$SEEN" != "0" ]; then
            echo "$SESSION briefing for $ETDATE already posted on #$N — skipping."
            exit 0
          fi
          gh issue comment "$N" --body-file out/briefing.md && echo "Posted $SESSION briefing for $ETDATE on #$N."
