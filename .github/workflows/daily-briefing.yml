name: daily-briefing

# TWO daily ES/GC reports — signal status + price levels (+ GC gamma map) — every
# trading day:  morning = US cash open 09:30 ET · evening = futures reopen 18:00 ET.
# (The separate daily-signal workflow stays quiet unless a BUY/EXIT fires.)
#
# GitHub's scheduler runs jobs LATE — observed ~2h delay every day — so a single
# cron at the open lands ~2h after it. Work around it: spray fire-points every 30m
# from ~2.5h before each open THROUGH the open (both DST UTC offsets), then
#   • a guard derives the session from the triggering cron's UTC hour (delay-proof),
#   • an earliness gate holds the post until >= the open (09:30 / 18:00 ET),
#   • a per-(date,session) marker dedupes to exactly one post.
# Whichever delayed fire first lands at/after the open wins, so the report arrives
# within ~30m of the open instead of ~2h late. Most fires just hit the guard and
# exit in ~2s (guard is the FIRST step, before any checkout/install).

on:
  schedule:
    # Morning — UNION of EDT(UTC=ET+4) & EST(UTC=ET+5) for ET 07:00–09:30 → UTC HH 11–14
    - cron: "0 11 * * 1-5"
    - cron: "30 11 * * 1-5"
    - cron: "0 12 * * 1-5"
    - cron: "30 12 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "30 13 * * 1-5"
    - cron: "0 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    # Evening — UNION for ET 15:30–18:00 → UTC HH 19–23
    - cron: "30 19 * * 1-5"
    - cron: "0 20 * * 1-5"
    - cron: "30 20 * * 1-5"
    - cron: "0 21 * * 1-5"
    - cron: "30 21 * * 1-5"
    - cron: "0 22 * * 1-5"
    - cron: "30 22 * * 1-5"
    - cron: "0 23 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "morning | evening | auto (pick by ET hour)"
        default: "auto"

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Session guard (session from the cron HOUR; gate at the open — delay-proof)
        id: guard
        run: |
          # Session is keyed off the triggering cron, NOT the execution wall-clock
          # (GitHub runs scheduled jobs late, so wall-clock lies). The gate holds the
          # post until the ET open and is "not before", so any delay only pushes it
          # later — never a false skip. This step runs first, before checkout/install,
          # so the ~15 sprayed fires that aren't yet at the open exit in ~2s.
          ETDATE=$(TZ=America/New_York date +%F)
          NOW=$((10#$(TZ=America/New_York date +%H%M)))   # ET HHMM, base-10 (avoid octal 08/09)
          echo "etdate=$ETDATE" >> "$GITHUB_OUTPUT"
          EARLIEST=0
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SESSION="${{ github.event.inputs.session }}"
            if [ "$SESSION" = "auto" ] || [ -z "$SESSION" ]; then
              if [ "$NOW" -lt 1200 ]; then SESSION="morning"; else SESSION="evening"; fi
            fi
          else
            HH=$(echo "${{ github.event.schedule }}" | awk '{print $2}')   # cron UTC hour
            case "$HH" in
              11|12|13|14)    SESSION="morning"; EARLIEST=930  ;;  # open 09:30 ET
              19|20|21|22|23) SESSION="evening"; EARLIEST=1800 ;;  # open 18:00 ET
              *) echo "cron hour $HH maps to no session — skipping";
                 echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0 ;;
            esac
            if [ "$NOW" -lt "$EARLIEST" ]; then
              echo "ET $NOW is before the $SESSION open ($EARLIEST) — a later sprayed fire will post. Skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
          fi
          echo "session=$SESSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Session: $SESSION  (ET $ETDATE, now $NOW)"

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install package
        if: steps.guard.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore data cache
        if: steps.guard.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: data/raw
          key: data-raw-brief-${{ github.run_id }}
          restore-keys: |
            data-raw-

      - name: Refresh data (retry transient fetch failures)
        if: steps.guard.outputs.skip != 'true'
        run: |
          for i in 1 2 3; do
            if python -m futures_swing.data_loader; then exit 0; fi
            echo "data_loader attempt $i failed; retrying in 20s..."; sleep 20
          done
          echo "data_loader failed after 3 attempts"; exit 1

      - name: Refresh fair-value inputs (cash index, short rate, gold spot — best-effort)
        if: steps.guard.outputs.skip != 'true'
        continue-on-error: true   # fair value is a nice-to-have; never fail the briefing on it
        run: python -m futures_swing.fair_value --refresh

      - name: Render briefing
        if: steps.guard.outputs.skip != 'true'
        env:
          BRIEF_DATE: ${{ steps.guard.outputs.etdate }}
          BRIEF_SESSION: ${{ steps.guard.outputs.session }}
        run: |
          mkdir -p out
          python -m futures_swing.briefing --out out/briefing.md

      - name: Post briefing (one persistent issue, per-session daily comment, deduped)
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ETDATE="${{ steps.guard.outputs.etdate }}"
          SESSION="${{ steps.guard.outputs.session }}"
          MARK="<!-- brief:${ETDATE}:${SESSION} -->"
          TITLE="📋 ES/GC daily briefing"
          printf '\n\n%s\ncc @%s\n' "$MARK" "${{ github.repository_owner }}" >> out/briefing.md
          N=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -z "$N" ]; then
            gh issue create --title "$TITLE" --body-file out/briefing.md && echo "Created briefing thread."
            exit 0
          fi
          SEEN=$(gh issue view "$N" --json body,comments \
                  --jq '(.body) + " " + ((.comments // []) | map(.body) | join(" "))' | grep -cF "$MARK" || true)
          if [ "$SEEN" != "0" ]; then
            echo "$SESSION briefing for $ETDATE already posted on #$N — skipping."
            exit 0
          fi
          gh issue comment "$N" --body-file out/briefing.md && echo "Posted $SESSION briefing for $ETDATE on #$N."
